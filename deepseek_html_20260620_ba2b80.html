<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Python Certificate · Full Screen</title>
  <style>
    /* global reset & full-screen layout */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1e2a;  /* deep neutral background, barely visible behind image */
      overflow: hidden;     /* no scrollbars, pure full-screen */
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
    }

    /* main container: fills viewport exactly */
    .certificate-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b0d14;  /* subtle dark border effect */
    }

    /* the image: cover entire screen, maintain aspect ratio, crisp */
    .certificate-wrapper img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;   /* show entire image, no crop, letterbox if needed */
      background: #f5f0e8;  /* warm off-white behind image (mimics paper) */
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05); /* subtle edge definition */
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;  /* image is not interactive, just display */
    }

    /* fallback: if image fails to load, show a stylish placeholder */
    .certificate-wrapper .fallback-text {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e2433;
      color: #d6dcec;
      text-align: center;
      padding: 2rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .certificate-wrapper .fallback-text h2 {
      font-weight: 400;
      font-size: clamp(1.8rem, 8vw, 4rem);
      margin-bottom: 0.75rem;
      color: #c0d0f0;
      border-bottom: 2px solid #3d4a66;
      padding-bottom: 0.5rem;
    }

    .certificate-wrapper .fallback-text p {
      font-size: clamp(1rem, 3vw, 1.6rem);
      max-width: 600px;
      opacity: 0.8;
    }

    /* show fallback only when image is broken */
    .certificate-wrapper img:not([src]) + .fallback-text,
    .certificate-wrapper img[src=""] + .fallback-text {
      display: flex;
    }

    /* but we also want fallback if image fails to load */
    .certificate-wrapper img:not([src]) ~ .fallback-text,
    .certificate-wrapper img[src=""] ~ .fallback-text {
      display: flex;
    }

    /* we use a sibling selector, but we'll add a small js fallback later */
    /* also ensures that if image loads, fallback is hidden */
    .certificate-wrapper img:not([src]) ~ .fallback-text {
      display: flex !important;
    }

    /* small print / credit – invisible on mobile, only for demo */
    .credits {
      position: fixed;
      bottom: 12px;
      right: 18px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 12px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      font-weight: 300;
      letter-spacing: 0.3px;
      pointer-events: none;
      z-index: 10;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: opacity 0.3s;
    }

    .credits a {
      color: rgba(255, 255, 255, 0.25);
      text-decoration: none;
      pointer-events: none;
    }

    /* for very small screens, hide credits */
    @media (max-width: 460px) {
      .credits {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="certificate-wrapper">
  <!-- 
    The image is embedded as a data-uri? No: we use the generated filename 
    as provided. Since the image is named "Gemini_Generated_Image_2jv3fa2jv3fa2jv3.png"
    we reference it directly. The file is expected in the same directory.
    We also add an onerror fallback to show the text version of the certificate.
  -->
  <img 
    id="certImage"
    src="Gemini_Generated_Image_2jv3fa2jv3fa2jv3.png" 
    alt="Python Certificate – Amir Ali Khajavi – Harvard CS50"
    title="Python Certificate · Amir Ali Khajavi · 2026"
    loading="eager"
    onerror="handleImageError()"
  />

  <!-- fallback content that appears if image is missing or broken -->
  <div class="fallback-text" id="fallbackContainer">
    <h2>🎓 Python Certificate</h2>
    <p style="font-size: clamp(1.8rem, 5vw, 3.2rem); margin: 0.5rem 0; font-weight: 300; color: #e8edff;">
      Amir Ali Khajavi
    </p>
    <p style="font-size: clamp(1rem, 2.5vw, 1.5rem); max-width: 700px; margin: 0.8rem auto;">
      <span style="opacity: 0.7;">completion of</span><br>
      <strong style="font-weight: 400; letter-spacing: 0.5px;">Introduction to Programming with Python</strong>
    </p>
    <p style="font-size: clamp(0.9rem, 1.8vw, 1.2rem); margin-top: 1.2rem; opacity: 0.7;">
      Cambridge, Massachusetts · 2026
    </p>
    <p style="font-size: clamp(0.8rem, 1.4vw, 1rem); margin-top: 1.8rem; border-top: 1px solid #3d4a66; padding-top: 1rem; opacity: 0.6;">
      David J. Malan · Gordon McKay Professor of the Practice of Computer Science<br>
      Harvard University
    </p>
  </div>
</div>

<!-- subtle watermark / credit (just for style) -->
<div class="credits">⸻ full screen · certificate</div>

<script>
  // ensure full-screen behavior even if image fails, and handle edge cases
  function handleImageError() {
    // the fallback is already shown via CSS, but we can also log
    console.log('Certificate image not found — showing text fallback.');
    // we also force the fallback to be visible by adding a class,
    // but CSS handles it via :not([src]) and [src=""] plus sibling.
    // However, if the src is set but 404, the attribute still exists.
    // So we use a more robust approach: if image fails, we hide image and show fallback.
    const img = document.getElementById('certImage');
    const fallback = document.getElementById('fallbackContainer');
    if (img && fallback) {
      img.style.display = 'none';        // hide broken image
      fallback.style.display = 'flex';   // show fallback container
    }
  }

  // also, if the image loads successfully, make sure fallback is hidden
  document.addEventListener('DOMContentLoaded', function() {
    const img = document.getElementById('certImage');
    const fallback = document.getElementById('fallbackContainer');
    if (img && fallback) {
      // if image loads, we ensure fallback is hidden (but CSS already handles)
      img.onload = function() {
        fallback.style.display = 'none';
        img.style.display = 'block';
      };
      // if image fails, we already have onerror, but we also check if src is empty
      if (!img.src || img.src === window.location.href) {
        // if src is empty or same as page, trigger fallback
        img.style.display = 'none';
        fallback.style.display = 'flex';
      }
    }
  });

  // extra safety: if for any reason the image is missing but onerror not fired,
  // we check after a small delay
  window.addEventListener('load', function() {
    const img = document.getElementById('certImage');
    const fallback = document.getElementById('fallbackContainer');
    if (img && fallback) {
      // if image is not complete or naturalWidth is 0, it's broken
      if (!img.complete || img.naturalWidth === 0) {
        img.style.display = 'none';
        fallback.style.display = 'flex';
      }
    }
  });
</script>

</body>
</html>
